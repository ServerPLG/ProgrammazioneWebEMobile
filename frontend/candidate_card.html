<!DOCTYPE html>
<html lang="it">
<head>
    <!-- Solite cose: caratteri italiani e grandezza per i cellulari -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La tua Card - DevCards</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <!-- Questo serve per l'ottimizzazione sui motori di ricerca, ci ha spiegato il prof -->
    <meta name="description" content="Anteprima della tua DevCard come la vedranno i datori di lavoro su DevCards.">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .card-preview-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 70px);
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .preview-title {
            text-align: center;
            margin-bottom: 2rem;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .preview-title h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: var(--primary-color);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.4rem;
        }

        .preview-title p {
            color: var(--text-muted-dark);
            font-size: 0.95rem;
        }

        .devcard {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .devcard-section-label {
            font-size: 0.85rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 0.6rem;
        }

        .devcard-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-color);
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.2);
        }

        .empty-card-state {
            text-align: center;
            padding: 3rem;
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            max-width: 500px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted-dark);
            text-decoration: none;
            font-size: 0.95rem;
            margin-top: 2rem;
            transition: all 0.3s ease;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
        }

        .back-link:hover {
            color: var(--primary-color);
            transform: translateX(-4px);
        }

        .qr-container {
            background: white;
            padding: 1rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

        <svg class="thin-line" viewBox="0 0 1000 1000" preserveAspectRatio="none">
            <path d="M-100,550 C300,650 400,200 600,700 C800,1200 900,900 1100,1000" />
        </svg>
    </div>
    <header style="padding: 1rem 2rem; background: var(--card-bg-light); border-bottom: 4px solid var(--secondary-color); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; z-index: 10;">
        <h2 style="color: var(--primary-color); margin: 0; font-size: 1.5rem; font-weight: 700;"><span class="brand-font">DevCards</span> <span style="font-size: 0.9rem; color: var(--text-muted-dark); font-weight: 400;">La tua Card</span></h2>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a href="candidate_home.html" class="nav-btn">🏠 Home</a>
            <button id="btnLogout" class="nav-btn-logout">Logout</button>
        </div>
    </header>

    <main class="card-preview-wrapper">
        <!-- Titolo sopra la card -->
        <div class="preview-title">
            <h1>La tua DevCard</h1>
            <p>Ecco come i datori di lavoro vedranno il tuo profilo</p>
        </div>

        <!-- Questo div è vuoto perché ci pensa Javascript a metterci dentro l'HTML della card -->
        <div id="cardContainer">
            <!-- La card verrà iniettata qui dal JS -->
        </div>

        <!-- Link per tornare indietro (meglio del bottone indietro del browser) -->
        <a href="candidate_home.html" class="back-link">← Torna alla Home</a>
    </main>

    <!-- Importo una libreria esterna (qrcode.js) presa da internet per creare il codice QR, altrimenti era impossibile farlo da soli! -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="./js/candidate_card.js"></script>
    <script src="./js/bg-script.js"></script>
</body>
</html>
