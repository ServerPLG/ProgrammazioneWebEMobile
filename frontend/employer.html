<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trova Talenti - DevCards</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .tinder-card-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 70vh;
            perspective: 1000px;
        }
        .devcard {
            width: 100%;
            max-width: 450px;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }
        .action-buttons {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-top: 2rem;
            width: 100%;
            max-width: 450px;
        }
        .btn-action {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: transform 0.2s, box-shadow 0.2s;
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            backdrop-filter: blur(10px);
        }
        .btn-skip:hover {
            transform: scale(1.1);
            border-color: #ff4b4b;
            box-shadow: 0 0 20px rgba(255, 75, 75, 0.4);
            color: #ff4b4b;
        }
        .btn-save:hover {
            transform: scale(1.1);
            border-color: #00F0FF;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
            color: #00F0FF;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            max-width: 500px;
        }
    </style>
</head>
<body>
    <header style="padding: 1rem 2rem; background: var(--card-bg); border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px);">
        <h2 style="color: var(--primary-color); margin: 0; font-size: 1.5rem; font-weight: 700;">DevCards <span style="font-size: 0.9rem; color: var(--text-muted); font-weight: 400;">Discovery</span></h2>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a href="saved_devcards.html" style="color: var(--text-main); text-decoration: none; font-size: 0.95rem; font-weight: 600; padding: 0.5rem 1rem; border-radius: 8px; background: rgba(255,255,255,0.1); transition: all 0.3s;">❤️ Preferiti</a>
            <button id="btnLogout" class="btn" style="padding: 0.5rem 1rem; font-size: 0.9rem; background: transparent; border: 1px solid var(--primary-color); color: var(--primary-color); width: auto;">Logout</button>
        </div>
    </header>

    <main style="padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%;">
        
        <div class="tinder-card-container">
            <!-- La singola card verrà iniettata qui dal JS -->
            <div id="activeCardContainer"></div>

            <div class="action-buttons" id="actionButtons" style="display: none;">
                <button class="btn-action btn-skip" id="btnSkip" title="Scarta">❌</button>
                <button class="btn-action btn-save" id="btnSave" title="Salva nei Preferiti">❤️</button>
            </div>
        </div>

    </main>
    <script src="./js/employer.js"></script>
</body>
</html>
