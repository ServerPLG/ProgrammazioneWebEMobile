<!DOCTYPE html>
<html lang="it">
<head>
    <!-- Soliti tag per far andare bene la pagina -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovery - DevCards</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .tinder-card-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 70vh;
            perspective: 1000px;
        }
        .devcard {
            width: 100%;
            max-width: 450px;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }
        .action-buttons {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-top: 2rem;
            width: 100%;
            max-width: 450px;
        }
        .btn-action {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: transform 0.2s, box-shadow 0.2s;
            background: #ffffff;
            border: 4px solid var(--secondary-color);
            backdrop-filter: blur(10px);
        }
        .btn-skip:hover {
            transform: scale(1.1);
            border-color: #ff4b4b;
            box-shadow: 0 0 20px rgba(255, 75, 75, 0.4);
            color: #ff4b4b;
        }
        .btn-save:hover {
            transform: scale(1.1);
            border-color: #00ff66;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.4);
            color: #00ff66;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: var(--card-bg-light);
            border-radius: 20px;
            border: 4px solid var(--secondary-color);
            max-width: 500px;
        }

        /* Modale Cambio Password */
        .pwd-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .pwd-modal-overlay.active { display: flex; }
        .pwd-modal {
            background: var(--card-bg-light);
            border: 4px solid var(--secondary-color);
            border-radius: 20px;
            padding: 2.5rem;
            width: 90%;
            max-width: 420px;
            animation: slideUp 0.3s ease;
        }
        .pwd-modal h3 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
        }
        .pwd-modal .form-group { margin-bottom: 1.2rem; }
        .pwd-modal .form-group label {
            display: block;
            color: var(--text-dark);
            font-weight: 600;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }
        .pwd-modal .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #ffffff;
            border: 1px solid var(--card-border-light);
            border-radius: 10px;
            color: var(--text-dark);
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .pwd-modal .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .pwd-result {
            margin-top: 1rem;
            font-size: 0.9rem;
            min-height: 1.2rem;
        }
        .pwd-modal-close {
            float: right;
            background: none;
            border: none;
            color: var(--text-muted-dark);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .pwd-modal-close:hover { color: #ff4b4b; }
    </style>
</head>
<body>


    <header style="padding: 1rem 2rem; background: var(--card-bg-light); border-bottom: 4px solid var(--secondary-color); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <h2 style="color: var(--primary-color); margin: 0; font-size: 1.5rem; font-weight: 700;"><span class="brand-font">DevCards</span> <span style="font-size: 0.9rem; color: var(--text-muted-dark); font-weight: 400;">Discovery</span></h2>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a href="saved_devcards.html" class="nav-btn">❤️ Preferiti</a>
            <a href="employer_profile.html" class="nav-btn">🏢 Azienda</a>
            <a href="employer_interviews.html" class="nav-btn">📅 Colloqui</a>
            <button id="btnChangePassword" class="nav-btn">🔒 Password</button>
            <button id="btnLogout" class="nav-btn-logout">Logout</button>
        </div>
    </header>

    <main style="padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%;">
        
        <!-- Qui c'è la grafica tipo Tinder dove si scorrono i profili -->
        <div class="tinder-card-container">
            <!-- La singola card del candidato (Javascript la metterà qui dentro) -->
            <div id="activeCardContainer"></div>

            <!-- Questi sono i due bottoni rotondi sotto la card (Scarta e Salva). Di base sono nascosti. -->
            <div class="action-buttons" id="actionButtons" style="display: none;">
                <!-- Bottone rosso con la X -->
                <button class="btn-action btn-skip" id="btnSkip" title="Scarta">❌</button>
                <!-- Bottone verde con il cuore -->
                <button class="btn-action btn-save" id="btnSave" title="Salva nei Preferiti">❤️</button>
            </div>
        </div>

    </main>

    <!-- Modale Cambio Password -->
    <div class="pwd-modal-overlay" id="changePasswordModal">
        <div class="pwd-modal">
            <button class="pwd-modal-close" id="closePwdModal">&times;</button>
            <h3>🔒 Cambia Password</h3>
            <form id="changePasswordForm">
                <div class="form-group">
                    <label for="oldPassword">Password Attuale</label>
                    <input type="password" id="oldPassword" placeholder="Inserisci la password attuale" required>
                </div>
                <div class="form-group">
                    <label for="newPassword">Nuova Password</label>
                    <input type="password" id="newPassword" placeholder="Almeno 6 caratteri" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Conferma Nuova Password</label>
                    <input type="password" id="confirmPassword" placeholder="Ripeti la nuova password" required minlength="6">
                </div>
                <button type="submit" class="btn" style="margin-top: 0.5rem;">Aggiorna Password</button>
                <div class="pwd-result" id="pwdResult"></div>
            </form>
        </div>
    </div>

    <script src="./js/employer.js"></script>
    <script src="./js/bg-script.js"></script>
</body>
</html>
