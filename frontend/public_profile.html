<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo Pubblico - DevCards</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .public-profile-page {
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }
        .public-profile-header {
            width: min(760px, 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            color: var(--text-main);
        }
        .public-profile-header h1 {
            color: var(--primary-color);
            font-size: 2rem;
        }
        .public-profile-wrapper {
            width: min(760px, 100%);
        }
        .public-profile-loading {
            color: var(--text-muted);
            text-align: center;
            padding: 3rem;
        }
        @media (max-width: 640px) {
            .public-profile-page { padding: 1rem; }
            .public-profile-header { align-items: flex-start; flex-direction: column; }
        }
    </style>
</head>
<body>
    <main class="public-profile-page">
        <header class="public-profile-header">
            <div>
                <h1 class="brand-font">DevCards</h1>
                <p>Profilo completo candidato</p>
            </div>
        </header>
        <section class="public-profile-wrapper" id="profileContainer">
            <div class="public-profile-loading">Caricamento profilo...</div>
        </section>
    </main>

    <script src="./js/devcard.js"></script>
    <script src="./js/public_profile.js"></script>
    <script src="./js/bg-script.js"></script>
</body>
</html>
