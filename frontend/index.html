<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCards - Incontra il tuo prossimo Developer</title>
    <link rel="stylesheet" href="./css/style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #1a1a2e;
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2.5rem;
            width: 90%;
            max-width: 420px;
            animation: slideUp 0.3s ease;
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Campi dinamici */
        #candidatoFields, #datoreFields { display: none; }

        /* Mappa */
        #regMap {
            width: 100%;
            height: 250px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            margin-top: 0.5rem;
            z-index: 1;
        }
        .map-search-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .map-search-row input { flex: 1; }
        .map-search-row button {
            padding: 0.6rem 1rem;
            border: 1px solid var(--primary-color);
            background: transparent;
            color: var(--primary-color);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }
        #mapSelectedLocation {
            font-size: 0.85rem;
            color: var(--primary-color);
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="glass-panel" id="loginPanel">
            <h1 class="title">DevCards</h1>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Accedi per continuare</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" class="form-control" required placeholder="mario@email.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn">Accedi</button>
            </form>

            <p style="text-align: center; margin-top: 1rem;">
                <a id="showRecoverPassword" style="color: var(--primary-color); cursor: pointer; font-size: 0.9rem;">Password dimenticata?</a>
            </p>
            
            <div class="toggle-form">
                Non hai un account? <a id="showRegister">Registrati ora</a>
            </div>
        </div>

        <div class="glass-panel" id="registerPanel" style="display: none; max-width: 650px;">
            <h1 class="title">Unisciti a noi</h1>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Crea il tuo account DevCards</p>
            
            <form id="registerForm">
                <div class="role-selector">
                    <label class="role-option">
                        <input type="radio" name="role" value="candidato" checked>
                        <div class="role-card">👨‍💻 Candidato</div>
                    </label>
                    <label class="role-option">
                        <input type="radio" name="role" value="datore">
                        <div class="role-card">🏢 Datore</div>
                    </label>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="regNome">Nome</label>
                        <input type="text" id="regNome" class="form-control" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="regCognome">Cognome</label>
                        <input type="text" id="regCognome" class="form-control" required>
                    </div>
                </div>

                <!-- Campi solo Candidato: Età + Anni Esperienza -->
                <div id="candidatoFields">
                    <div style="display: flex; gap: 1rem;">
                        <div class="form-group" style="flex: 1;">
                            <label for="regEta">Età</label>
                            <input type="number" id="regEta" class="form-control" min="16" max="99" placeholder="Es. 25">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="regExp">Anni di Esperienza</label>
                            <input type="number" id="regExp" class="form-control" min="0" placeholder="Es. 3">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="regMaxDistanza">Distanza massima dal luogo di lavoro (km)</label>
                        <input type="number" id="regMaxDistanza" class="form-control" min="0" placeholder="Es. 50 (lascia vuoto per nessun limite)">
                    </div>
                    <div class="form-group">
                        <label>Foto Profilo</label>
                        <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                            <button type="button" id="btnFotoFile" class="btn" style="flex:1; padding: 0.6rem; font-size: 0.85rem; background: transparent; border: 1px solid var(--primary-color); color: var(--primary-color);">📁 Da Dispositivo</button>
                            <button type="button" id="btnFotoLink" class="btn" style="flex:1; padding: 0.6rem; font-size: 0.85rem; background: transparent; border: 1px solid var(--card-border); color: var(--text-muted);">🔗 Da Link</button>
                        </div>
                        <input type="file" id="regFoto" class="form-control" accept="image/*" style="display: none;">
                        <input type="url" id="regFotoUrl" class="form-control" placeholder="https://esempio.com/foto.jpg" style="display: none;">
                    </div>
                </div>

                <!-- Campi solo Datore -->
                <div id="datoreFields">
                    <div class="form-group">
                        <label for="regDescAzienda">Descrizione Azienda</label>
                        <textarea id="regDescAzienda" class="form-control" rows="3" placeholder="Descrivete brevemente la vostra azienda..."></textarea>
                    </div>
                </div>

                <!-- Mappa per il Luogo di Residenza / Sede -->
                <div class="form-group">
                    <label id="mapLabel">📍 Luogo di Residenza</label>
                    <div class="map-search-row">
                        <input type="text" id="regCitta" class="form-control" placeholder="Cerca una città..." required>
                        <button type="button" id="btnSearchMap">Cerca</button>
                    </div>
                    <div id="regMap"></div>
                    <div id="mapSelectedLocation"></div>
                    <input type="hidden" id="regLat">
                    <input type="hidden" id="regLon">
                </div>

                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" class="form-control" required>
                </div>
                
                <button type="submit" class="btn">Registrati</button>
            </form>
            
            <div class="toggle-form">
                Hai già un account? <a id="showLogin">Accedi</a>
            </div>
        </div>
    </div>

    <!-- Modale Recupero Password -->
    <div class="modal-overlay" id="recoverModal">
        <div class="modal-content">
            <button class="modal-close" id="closeRecoverModal">&times;</button>
            <h3 style="color: var(--primary-color); margin-bottom: 1.5rem;">Recupera Password</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Inserisci la tua email. La password verrà reimpostata a <strong style="color: var(--text-main);">123456</strong>.</p>
            <form id="recoverForm">
                <div class="form-group">
                    <input type="email" id="recoverEmail" class="form-control" required placeholder="La tua email">
                </div>
                <button type="submit" class="btn">Reimposta Password</button>
            </form>
            <div id="recoverResult" style="margin-top: 1rem; text-align: center;"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./js/auth.js"></script>
</body>
</html>
