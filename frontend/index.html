<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCards - Incontra il tuo prossimo Developer</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--card-bg-light);
            border: 4px solid var(--secondary-color);
            border-radius: 20px;
            padding: 2.5rem;
            width: 90%;
            max-width: 420px;
            animation: slideUp 0.3s ease;
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: var(--text-muted-dark);
            font-size: 1.5rem;
            cursor: pointer;
        }
        #candidatoFields,
        #mapSection {
            display: none;
        }
        #regMap {
            width: 100%;
            height: 250px;
            border-radius: 12px;
            border: 1px solid var(--card-border-light);
            margin-top: 0.5rem;
            z-index: 1;
        }
        .map-search-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .map-search-row input { flex: 1; }
        .map-search-row button {
            padding: 0.6rem 1rem;
            border: 1px solid var(--primary-color);
            background: transparent;
            color: var(--primary-color);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }
        #mapSelectedLocation {
            font-size: 0.85rem;
            color: #0d6b31;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body class="auth-page">
    <main class="auth-reference-shell">
        <section class="auth-trailer-side">
            <div class="auth-trailer-heading">
                <h1 class="brand-font">DevCards</h1>
                <p>La piattaforma che connette sviluppatori e aziende</p>
            </div>
            <div class="auth-video-frame">
                <iframe
                    src="https://www.youtube.com/embed/i5Rtqeq9Ou8"
                    title="DevCards trailer"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen>
                </iframe>
            </div>
            <a class="auth-more-link" href="assets/DevCards_Revisione3.0.pdf" download="DevCards_Presentazione.pdf">Scopri di piu</a>
        </section>

        <section class="auth-card-stage">
            <div class="auth-card-window">
                <div class="glass-panel auth-panel" id="loginPanel">
                    <h1 class="title"><span class="brand-font">DevCards</span></h1>

                    <form id="loginForm">
                        <div class="form-group">
                            <label for="loginEmail">Email</label>
                            <input type="email" id="loginEmail" class="form-control" required placeholder="admin@gmail.com">
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Password</label>
                            <input type="password" id="loginPassword" class="form-control" required placeholder="Password">
                        </div>
                        <button type="submit" class="btn">ACCEDI</button>
                    </form>

                    <p style="text-align: center; margin-top: 1.2rem;">
                        <a id="showRecoverPassword" style="color: var(--primary-color); cursor: pointer; font-size: 0.95rem;">Password dimenticata?</a>
                    </p>

                    <div class="toggle-form">
                        Non hai un account? <a id="showRegister">Registrati ora</a>
                    </div>
                </div>

                <div class="glass-panel auth-panel" id="registerPanel" style="display: none;">
                    <h1 class="title"><span class="brand-font">DevCards</span></h1>
                    <p style="text-align: center; color: var(--text-muted-dark); margin-bottom: 2rem;">Crea il tuo account</p>

                    <form id="registerForm">
                        <div class="role-selector">
                            <label class="role-option">
                                <input type="radio" name="role" value="candidato" checked>
                                <div class="role-card">Candidato</div>
                            </label>
                            <label class="role-option">
                                <input type="radio" name="role" value="datore">
                                <div class="role-card">Datore</div>
                            </label>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="regNome">Nome</label>
                                <input type="text" id="regNome" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="regCognome">Cognome</label>
                                <input type="text" id="regCognome" class="form-control" required>
                            </div>
                        </div>

                        <div id="candidatoFields">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="regEta">Eta</label>
                                    <input type="number" id="regEta" class="form-control" min="16" max="99" placeholder="Es. 25">
                                </div>
                                <div class="form-group">
                                    <label for="regExp">Anni di Esperienza</label>
                                    <input type="number" id="regExp" class="form-control" min="0" placeholder="Es. 3">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="regLang">Linguaggi di Programmazione</label>
                                <textarea id="regLang" class="form-control" rows="3" placeholder="JavaScript, HTML, CSS, Python, SQL..."></textarea>
                            </div>
                            <div class="form-group">
                                <label for="regBio">Descrizione</label>
                                <textarea id="regBio" class="form-control" rows="4" placeholder="Parlaci di te, delle tue esperienze e dei tuoi obiettivi..."></textarea>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="regPhone">Telefono</label>
                                    <input type="tel" id="regPhone" class="form-control" placeholder="+39 ...">
                                </div>
                                <div class="form-group">
                                    <label for="regLinkedIn">LinkedIn</label>
                                    <input type="url" id="regLinkedIn" class="form-control" placeholder="https://linkedin.com/in/...">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="regGitHub">GitHub</label>
                                <input type="url" id="regGitHub" class="form-control" placeholder="https://github.com/...">
                            </div>
                            <div class="form-group">
                                <label for="regMaxDistanza">Distanza massima dal luogo di lavoro (km)</label>
                                <input type="number" id="regMaxDistanza" class="form-control" min="0" placeholder="Es. 50">
                            </div>
                            <div class="form-group">
                                <label>Foto Profilo</label>
                                <input type="file" id="regFoto" class="form-control" accept="image/*">
                            </div>
                        </div>

                        <div class="form-group" id="mapSection">
                            <label id="mapLabel">Luogo di Residenza</label>
                            <div class="map-search-row">
                                <input type="text" id="regCitta" class="form-control" placeholder="Cerca una citta...">
                                <button type="button" id="btnSearchMap">Cerca</button>
                            </div>
                            <div id="regMap"></div>
                            <div id="mapSelectedLocation"></div>
                            <input type="hidden" id="regLat">
                            <input type="hidden" id="regLon">
                        </div>

                        <div class="form-group">
                            <label for="regEmail">Email</label>
                            <input type="email" id="regEmail" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="regPassword">Password</label>
                            <input type="password" id="regPassword" class="form-control" required>
                        </div>

                        <button type="submit" class="btn">REGISTRATI</button>
                    </form>

                    <div class="toggle-form">
                        Hai gia un account? <a id="showLogin">Accedi</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="recoverModal">
        <div class="modal-content">
            <button class="modal-close" id="closeRecoverModal">&times;</button>
            <h3 style="color: var(--primary-color); margin-bottom: 1.5rem;">Recupera Password</h3>
            <p style="color: var(--text-muted-dark); font-size: 0.9rem; margin-bottom: 1.5rem;">Inserisci la tua email. La password verra reimpostata a <strong style="color: var(--text-dark);">123456</strong>.</p>
            <form id="recoverForm">
                <div class="form-group">
                    <input type="email" id="recoverEmail" class="form-control" required placeholder="La tua email">
                </div>
                <button type="submit" class="btn">Reimposta Password</button>
            </form>
            <div id="recoverResult" style="margin-top: 1rem; text-align: center;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/bg-script.js"></script>
</body>
</html>
