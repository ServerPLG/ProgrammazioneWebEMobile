<!DOCTYPE html>
<html lang="it">
<head>
    <!-- Impostazioni iniziali della pagina -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preferiti - DevCards</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .devcard:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 255, 102, 0.2);
            border-color: var(--primary-color);
        }

        /* Modale Proponi Colloquio */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow-y: auto;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--card-bg-light);
            border: 4px solid var(--secondary-color);
            border-radius: 20px;
            padding: 2.5rem;
            width: 90%;
            max-width: 500px;
            max-height: calc(100vh - 2rem);
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: var(--text-muted-dark);
            font-size: 1.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>


    <header style="padding: 1rem 2rem; background: var(--card-bg-light); border-bottom: 4px solid var(--secondary-color); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <h2 style="color: var(--primary-color); margin: 0; font-size: 1.5rem; font-weight: 700;"><span class="brand-font">DevCards</span> <span style="font-size: 0.9rem; color: var(--text-muted-dark); font-weight: 400;">Preferiti</span></h2>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a href="employer.html" class="nav-btn">⬅️ Torna a Discovery</a>
            <a href="employer_interviews.html" class="nav-btn">📅 Colloqui</a>
            <button id="btnLogout" class="nav-btn-logout">Logout</button>
        </div>
    </header>

    <main style="padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%;">
        <!-- Barra dei filtri in alto -->
        <div class="filters" style="margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; background: var(--card-bg-light); padding: 1.5rem; border-radius: 16px; border: 4px solid var(--secondary-color); box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <div style="flex: 1; min-width: 180px;">
                <label style="color: var(--text-muted-dark); font-size: 0.9rem; display: block; margin-bottom: 0.5rem;">Linguaggio</label>
                <!-- Casella di testo per filtrare per linguaggio. Il JS userà questo ID -->
                <input type="text" id="filterLang" class="form-control" placeholder="Es. JavaScript">
            </div>
            <div style="flex: 1; min-width: 180px;">
                <label style="color: var(--text-muted-dark); font-size: 0.9rem; display: block; margin-bottom: 0.5rem;">Città</label>
                <input type="text" id="filterCity" class="form-control" placeholder="Es. Milano">
            </div>
            <div style="flex: 1; min-width: 150px;">
                <label style="color: var(--text-muted-dark); font-size: 0.9rem; display: block; margin-bottom: 0.5rem;">Anni Esperienza Minimi</label>
                <input type="number" id="filterExp" class="form-control" placeholder="Es. 5" min="0">
            </div>
            <div style="flex: 1; min-width: 180px;">
                <label style="color: var(--text-muted-dark); font-size: 0.9rem; display: block; margin-bottom: 0.5rem;">Lingua</label>
                <input type="text" id="filterLingua" class="form-control" placeholder="Es. Inglese">
            </div>
            <div style="display: flex; align-items: flex-end;">
                <button id="btnFilter" class="btn" style="padding: 1rem 2rem; width: auto;">Filtra</button>
            </div>
        </div>

        <!-- Feed DevCards Salvate: Questa è la griglia dove andranno le carte -->
        <div class="devcards-feed" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 2rem;" id="devcardsContainer">
            <!-- Popolato da JS -->
        </div>
    </main>

    <!-- Modale (popup) Proponi Colloquio. All'inizio è nascosta -->
    <div class="candidate-modal-overlay" id="savedCandidateProfileModal">
        <div class="candidate-modal">
            <button class="candidate-modal-close" id="closeSavedCandidateProfileModal">&times;</button>
            <div id="savedCandidateProfileBody"></div>
        </div>
    </div>

    <div class="modal-overlay" id="interviewModal">
        <div class="modal-content">
            <button class="modal-close" id="closeInterviewModal">&times;</button>
            <h3 style="color: var(--primary-color); margin-bottom: 1.5rem;">💼 Proponi Colloquio</h3>
            <p style="color: var(--text-muted-dark); font-size: 0.85rem; margin-bottom: 1.5rem;">Compila i dettagli della posizione che vuoi offrire a <strong id="interviewCandidateName" style="color: var(--text-dark);"></strong>.</p>
            <form id="interviewForm">
                <input type="hidden" id="interviewCandidateId">
                <div class="form-group">
                    <label style="color: var(--text-muted-dark);">Posizione Cercata</label>
                    <input type="text" id="ivPosizione" class="form-control" placeholder="Es. Frontend Developer Senior" required>
                </div>
                <div class="form-group">
                    <label style="color: var(--text-muted-dark);">Linguaggi Richiesti</label>
                    <input type="text" id="ivLinguaggi" class="form-control" placeholder="Es. React, TypeScript">
                </div>
                <div class="form-group">
                    <label style="color: var(--text-muted-dark);">Range Stipendio</label>
                    <input type="text" id="ivStipendio" class="form-control" placeholder="Es. 30.000€ - 45.000€">
                </div>
                <div class="form-group">
                    <label style="color: var(--text-muted-dark);">Luogo di Lavoro</label>
                    <input type="text" id="ivLuogo" class="form-control" placeholder="Es. Milano">
                </div>
                <div class="form-group">
                    <label style="color: var(--text-muted-dark);">Luogo del Colloquio</label>
                    <input type="text" id="ivLuogoColloquio" class="form-control" placeholder="Es. Sede Centrale, Stanza 3 / Link Zoom" required>
                </div>
                <div class="form-group">
                    <label style="color: var(--text-muted-dark);">Data del Colloquio</label>
                    <input type="date" id="ivData" class="form-control" required>
                </div>
                <div class="form-group">
                    <label style="color: var(--text-muted-dark);">Ora del Colloquio</label>
                    <input type="time" id="ivOra" class="form-control" required>
                </div>
                <button type="submit" class="btn" style="margin-top: 1rem;">Invia Proposta</button>
            </form>
            <div id="interviewResult" style="margin-top: 1rem; text-align: center;"></div>
        </div>
    </div>

    <script src="./js/devcard.js"></script>
    <script src="./js/saved.js"></script>
    <script src="./js/bg-script.js"></script>
</body>
</html>
