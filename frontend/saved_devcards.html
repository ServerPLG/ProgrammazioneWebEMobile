<!DOCTYPE html>
<html lang="it">
<head>
    <!-- Impostazioni iniziali della pagina -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidati Salvati - DevCards</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .devcard:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 255, 102, 0.2);
            border-color: var(--primary-color);
        }

        /* Modale Proponi Colloquio */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #1a1a2e;
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2.5rem;
            width: 90%;
            max-width: 500px;
            animation: slideUp 0.3s ease;
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header style="padding: 1rem 2rem; background: var(--card-bg); border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px);">
        <h2 style="color: var(--primary-color); margin: 0; font-size: 1.5rem; font-weight: 700;">DevCards <span style="font-size: 0.9rem; color: var(--text-muted); font-weight: 400;">Candidati Salvati</span></h2>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a href="employer.html" style="color: var(--text-main); text-decoration: none; font-size: 0.95rem; font-weight: 600; padding: 0.5rem 1rem; border-radius: 8px; background: rgba(255,255,255,0.1); transition: all 0.3s;">⬅️ Torna a Discovery</a>
            <button id="btnLogout" class="btn" style="padding: 0.5rem 1rem; font-size: 0.9rem; background: transparent; border: 1px solid var(--primary-color); color: var(--primary-color); width: auto;">Logout</button>
        </div>
    </header>

    <main style="padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%;">
        <!-- Barra dei filtri in alto -->
        <div class="filters" style="margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 16px; border: 1px solid var(--card-border);">
            <div style="flex: 1; min-width: 180px;">
                <label style="color: var(--text-muted); font-size: 0.9rem; display: block; margin-bottom: 0.5rem;">Linguaggio</label>
                <!-- Casella di testo per filtrare per linguaggio. Il JS userà questo ID -->
                <input type="text" id="filterLang" class="form-control" placeholder="Es. JavaScript">
            </div>
            <div style="flex: 1; min-width: 180px;">
                <label style="color: var(--text-muted); font-size: 0.9rem; display: block; margin-bottom: 0.5rem;">Città</label>
                <input type="text" id="filterCity" class="form-control" placeholder="Es. Milano">
            </div>
            <div style="flex: 1; min-width: 150px;">
                <label style="color: var(--text-muted); font-size: 0.9rem; display: block; margin-bottom: 0.5rem;">Anni Esperienza Minimi</label>
                <input type="number" id="filterExp" class="form-control" placeholder="Es. 5" min="0">
            </div>
            <div style="flex: 1; min-width: 180px;">
                <label style="color: var(--text-muted); font-size: 0.9rem; display: block; margin-bottom: 0.5rem;">Lingua</label>
                <input type="text" id="filterLingua" class="form-control" placeholder="Es. Inglese">
            </div>
            <div style="display: flex; align-items: flex-end;">
                <button id="btnFilter" class="btn" style="padding: 1rem 2rem; width: auto;">Filtra</button>
            </div>
        </div>

        <!-- Feed DevCards Salvate: Questa è la griglia dove andranno le carte -->
        <div class="devcards-feed" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 2rem;" id="devcardsContainer">
            <!-- Popolato da JS -->
        </div>
    </main>

    <!-- Modale (popup) Proponi Colloquio. All'inizio è nascosta -->
    <div class="modal-overlay" id="interviewModal">
        <div class="modal-content">
            <button class="modal-close" id="closeInterviewModal">&times;</button>
            <h3 style="color: var(--primary-color); margin-bottom: 1.5rem;">💼 Proponi Colloquio</h3>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.5rem;">Compila i dettagli della posizione che vuoi offrire a <strong id="interviewCandidateName" style="color: var(--text-main);"></strong>.</p>
            <form id="interviewForm">
                <input type="hidden" id="interviewCandidateId">
                <div class="form-group">
                    <label style="color: var(--text-muted);">Posizione Cercata</label>
                    <input type="text" id="ivPosizione" class="form-control" placeholder="Es. Frontend Developer Senior" required>
                </div>
                <div class="form-group">
                    <label style="color: var(--text-muted);">Linguaggi Richiesti</label>
                    <input type="text" id="ivLinguaggi" class="form-control" placeholder="Es. React, TypeScript">
                </div>
                <div class="form-group">
                    <label style="color: var(--text-muted);">Range Stipendio</label>
                    <input type="text" id="ivStipendio" class="form-control" placeholder="Es. 30.000€ - 45.000€">
                </div>
                <div class="form-group">
                    <label style="color: var(--text-muted);">Luogo di Lavoro</label>
                    <input type="text" id="ivLuogo" class="form-control" placeholder="Es. Milano / Remoto">
                </div>
                <button type="submit" class="btn" style="margin-top: 1rem;">Invia Proposta</button>
            </form>
            <div id="interviewResult" style="margin-top: 1rem; text-align: center;"></div>
        </div>
    </div>

    <script src="./js/saved.js"></script>
</body>
</html>
