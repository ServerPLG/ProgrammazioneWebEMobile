<!DOCTYPE html>
<html lang="it">
<head>
    <!-- Configurazione standard -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCard Pubblica</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-color);
            padding: 1rem;
            position: relative;
            z-index: 1;
        }

        .public-wrapper {
            width: 100%;
            max-width: 480px;
        }

        .devcard {
            width: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .devcard-section-label {
            font-size: 0.85rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 0.6rem;
        }

        .devcard-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-color);
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.2);
        }

        .loading {
            text-align: center;
            color: var(--text-muted-dark);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>


    <!-- In questo div Javascript ci stamperà dentro il curriculum del candidato quando qualcuno inquadra il QR Code -->
    <div class="public-wrapper" id="cardContainer">
        <!-- Messaggio temporaneo mentre scarica i dati dal database -->
        <div class="loading">Caricamento DevCard in corso...</div>
    </div>

    <script src="./js/public_card.js"></script>
    <script src="./js/bg-script.js"></script>
</body>
</html>
