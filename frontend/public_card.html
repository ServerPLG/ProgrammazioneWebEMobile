<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCard Pubblica</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-color);
            padding: 1rem;
        }

        .public-wrapper {
            width: 100%;
            max-width: 480px;
        }

        .devcard {
            width: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .devcard-section-label {
            font-size: 0.85rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 0.6rem;
        }

        .lang-tag {
            display: inline-block;
            background: rgba(0, 255, 102, 0.1);
            color: var(--primary-color);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid rgba(0, 255, 102, 0.2);
        }

        .devcard-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-color);
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.2);
        }

        .smartworking-badge {
            display: inline-block;
            margin-top: 0.3rem;
            background: rgba(0, 255, 102, 0.1);
            color: var(--primary-color);
            padding: 0.25rem 0.7rem;
            border-radius: 12px;
            font-size: 0.8rem;
            border: 1px solid rgba(0, 255, 102, 0.2);
        }

        .card-glow {
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: var(--gradient);
            border-radius: 26px;
            z-index: -1;
            opacity: 0.15;
            filter: blur(20px);
            animation: pulseGlow 3s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.2; transform: scale(1.02); }
        }
        
        .loading {
            text-align: center;
            color: var(--text-muted);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="public-wrapper" id="cardContainer">
        <div class="loading">Caricamento DevCard in corso...</div>
    </div>

    <script src="./js/public_card.js"></script>
</body>
</html>
