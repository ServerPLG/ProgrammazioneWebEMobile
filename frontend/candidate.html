<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il tuo Profilo - DevCards</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .lingua-row {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            margin-bottom: 0.8rem;
            animation: slideUp 0.3s ease;
        }
        .lingua-row input { flex: 2; }
        .lingua-row select { flex: 1; }
        .lingua-row button {
            background: none;
            border: none;
            color: #ff4b4b;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0 0.5rem;
        }
        .add-lingua-btn {
            width: 100%;
            padding: 0.8rem;
            border: 1px dashed var(--primary-color);
            border-radius: 12px;
            background: transparent;
            color: var(--primary-color);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }
        .add-lingua-btn:hover { background: rgba(0,255,102,0.05); }
    </style>
</head>

<body>
    <header
        style="padding: 1rem 2rem; background: var(--card-bg); border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px);">
        <h2 style="color: var(--primary-color); margin: 0; font-size: 1.5rem; font-weight: 700;">DevCards <span
                style="font-size: 0.9rem; color: var(--text-muted); font-weight: 400;">Candidate Dashboard</span></h2>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a href="candidate_home.html" style="color: var(--text-main); text-decoration: none; font-size: 0.95rem; font-weight: 600; padding: 0.5rem 1rem; border-radius: 8px; background: rgba(255,255,255,0.1); transition: all 0.3s;">🏠 Home</a>
            <button id="btnLogout" class="btn"
                style="padding: 0.5rem 1rem; font-size: 0.9rem; background: transparent; border: 1px solid var(--primary-color); color: var(--primary-color); width: auto;">Logout</button>
        </div>
    </header>

    <main style="padding: 2rem; max-width: 800px; margin: 0 auto; width: 100%;">
        <div class="glass-panel" style="max-width: 100%;">
            <h2 class="title" style="font-size: 2rem; text-align: left; margin-bottom: 2rem;">Compila il tuo CV</h2>

            <form id="cvForm">
                <div class="form-group">
                    <label style="color: var(--text-main); font-weight: 600;">Breve Biografia (Testo Libero)</label>
                    <textarea id="cvBio" class="form-control" rows="5"
                        placeholder="Parlaci di te, delle tue esperienze e dei tuoi obiettivi..."
                        style="resize: vertical;" required></textarea>
                </div>

                <div class="form-group">
                    <label style="color: var(--text-main); font-weight: 600;">Competenze (separate da virgola)</label>
                    <input type="text" id="cvComp" class="form-control"
                        placeholder="Es. Problem Solving, Teamwork, UI Design" required>
                </div>

                <div class="form-group">
                    <label style="color: var(--text-main); font-weight: 600;">Linguaggi di Programmazione (separati da virgola)</label>
                    <input type="text" id="cvLang" class="form-control" placeholder="Es. JavaScript, HTML, CSS, Python" required>
                </div>

                <div class="form-group">
                    <label style="color: var(--text-main); font-weight: 600;">Luogo in cui preferisci lavorare</label>
                    <input type="text" id="cvLuogo" class="form-control" placeholder="Es. Milano, Roma, Remoto" required>
                    <small style="color: var(--text-muted); font-size: 0.8rem;">Verrà geolocalizzato automaticamente via OpenStreetMap</small>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem;">
                    <input type="checkbox" id="cvDisponibileOvunque"
                        style="width: 1.2rem; height: 1.2rem; accent-color: var(--primary-color); cursor: pointer;">
                    <label for="cvDisponibileOvunque"
                        style="color: var(--text-main); font-weight: 600; cursor: pointer;">Disponibile a lavorare ovunque</label>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem;">
                    <input type="checkbox" id="cvSmartworking"
                        style="width: 1.2rem; height: 1.2rem; accent-color: var(--primary-color); cursor: pointer;">
                    <label for="cvSmartworking"
                        style="color: var(--text-main); font-weight: 600; cursor: pointer;">Disponibile a lavorare in Smartworking</label>
                </div>

                <!-- Competenze Linguistiche con livello -->
                <div class="form-group" style="margin-top: 1.5rem;">
                    <label style="color: var(--text-main); font-weight: 600;">Competenze Linguistiche</label>
                    <div id="lingueContainer"></div>
                    <button type="button" class="add-lingua-btn" id="addLingua">+ Aggiungi Lingua</button>
                </div>

                <h3
                    style="margin: 3rem 0 1.5rem; color: var(--text-main); font-size: 1.2rem; border-bottom: 1px solid var(--card-border); padding-bottom: 0.5rem;">
                    I tuoi contatti privati</h3>
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem;">Questi dati saranno
                    nascosti nella tua DevCard finché un Datore di lavoro non clicca su "Contatta".</p>

                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <div class="form-group" style="flex: 1; min-width: 250px;">
                        <label>Numero di Telefono</label>
                        <input type="tel" id="cvPhone" class="form-control" placeholder="+39 ...">
                    </div>
                    <div class="form-group" style="flex: 1; min-width: 250px;">
                        <label>Link Instagram</label>
                        <input type="url" id="cvInsta" class="form-control" placeholder="https://instagram.com/...">
                    </div>
                </div>

                <button type="submit" class="btn" style="margin-top: 2rem;">Salva il CV e Aggiorna la tua DevCard</button>
            </form>
        </div>
    </main>
    <script src="./js/candidate.js"></script>
</body>

</html>
