<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colloqui - DevCards</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .interviews-wrapper {
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }
        
        .section-title {
            color: var(--primary-color);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .interview-card {
            background: var(--card-bg-light);
            border: 4px solid var(--secondary-color);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s;
            animation: slideUp 0.4s ease-out;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .interview-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .avatar-container {
            flex-shrink: 0;
        }

        .avatar-container img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }

        .interview-info {
            flex-grow: 1;
        }

        .interview-info h4 {
            color: var(--text-dark);
            font-size: 1.2rem;
            margin: 0 0 0.3rem;
        }

        .interview-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 0.5rem 0;
            font-size: 0.9rem;
            color: var(--text-muted-dark);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-accepted { background: rgba(0,255,102,0.1); color: var(--primary-color); border: 1px solid rgba(0,255,102,0.2); }
        .status-rejected { background: rgba(255,75,75,0.1); color: #ff4b4b; border: 1px solid rgba(255,75,75,0.2); }
        .status-pending { background: rgba(255,200,0,0.1); color: #FFC800; border: 1px solid rgba(255,200,0,0.2); }

    </style>
</head>
<body>


    <header style="padding: 1rem 2rem; background: var(--card-bg-light); border-bottom: 4px solid var(--secondary-color); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <h2 style="color: var(--primary-color); margin: 0; font-size: 1.5rem; font-weight: 700;"><span class="brand-font">DevCards</span> <span style="font-size: 0.9rem; color: var(--text-muted-dark); font-weight: 400;">Colloqui</span></h2>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a href="employer.html" class="nav-btn">⬅️ Torna a Discovery</a>
            <button id="btnLogout" class="nav-btn-logout">Logout</button>
        </div>
    </header>

    <main class="interviews-wrapper">
        <h3 class="section-title">📅 Proposte Inviate</h3>
        
        <!-- Contenitore dove JavaScript aggiungerà i colloqui -->
        <div id="interviewsContainer">
            <p style="color: var(--text-muted-dark);">Caricamento...</p>
        </div>
    </main>

    <script src="./js/employer_interviews.js"></script>
    <script src="./js/bg-script.js"></script>
</body>
</html>
