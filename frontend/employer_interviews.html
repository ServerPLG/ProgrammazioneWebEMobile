<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colloqui Inviati - DevCards</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .interviews-wrapper {
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }
        
        .section-title {
            color: var(--primary-color);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .interview-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s;
            animation: slideUp 0.4s ease-out;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .interview-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .avatar-container {
            flex-shrink: 0;
        }

        .avatar-container img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }

        .interview-info {
            flex-grow: 1;
        }

        .interview-info h4 {
            color: var(--text-main);
            font-size: 1.2rem;
            margin: 0 0 0.3rem;
        }

        .interview-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 0.5rem 0;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-accepted { background: rgba(0,255,102,0.1); color: var(--primary-color); border: 1px solid rgba(0,255,102,0.2); }
        .status-rejected { background: rgba(255,75,75,0.1); color: #ff4b4b; border: 1px solid rgba(255,75,75,0.2); }
        .status-pending { background: rgba(255,200,0,0.1); color: #FFC800; border: 1px solid rgba(255,200,0,0.2); }

    </style>
</head>
<body>
    <header style="padding: 1rem 2rem; background: var(--card-bg); border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px);">
        <h2 style="color: var(--primary-color); margin: 0; font-size: 1.5rem; font-weight: 700;">DevCards <span style="font-size: 0.9rem; color: var(--text-muted); font-weight: 400;">Colloqui</span></h2>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a href="employer.html" style="color: var(--text-main); text-decoration: none; font-size: 0.95rem; font-weight: 600; padding: 0.5rem 1rem; border-radius: 8px; background: rgba(255,255,255,0.1); transition: all 0.3s;">⬅️ Torna a Discovery</a>
            <button id="btnLogout" class="btn" style="padding: 0.5rem 1rem; font-size: 0.9rem; background: transparent; border: 1px solid var(--primary-color); color: var(--primary-color); width: auto;">Logout</button>
        </div>
    </header>

    <main class="interviews-wrapper">
        <h3 class="section-title">📅 Proposte Inviate</h3>
        
        <!-- Contenitore dove JavaScript aggiungerà i colloqui -->
        <div id="interviewsContainer">
            <p style="color: var(--text-muted);">Caricamento...</p>
        </div>
    </main>

    <script src="./js/employer_interviews.js"></script>
</body>
</html>
