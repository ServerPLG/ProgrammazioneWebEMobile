<ion-header class="ion-no-border">
  <app-page-header subtitle="Discovery">
  <a class="nav-btn" routerLink="/saved">❤️ Preferiti</a>
  <a class="nav-btn" routerLink="/employer-profile">🏢 Azienda</a>
  <a class="nav-btn" routerLink="/employer-interviews">📅 Colloqui</a>
  <button class="nav-btn" (click)="openPasswordModal()">🔒 Password</button>
  <button class="nav-btn-logout" (click)="logout()">Logout</button>
</app-page-header>
</ion-header>

<ion-content>
  <main class="page-main">
    <div class="tinder-card-container">
      <div id="activeCardContainer">
        <!-- Card corrente -->
        <div class="discovery-card-stack" *ngIf="current as card">
          <div class="swipe-wrap" [ngClass]="swipeClass">
            <app-devcard [card]="card" [contactMode]="'full'" [showDistance]="true"></app-devcard>
          </div>
          <button type="button" class="profile-view-btn" (click)="openProfile(card)">Visualizza profilo</button>
        </div>

        <!-- Stato vuoto -->
        <div class="empty-state" *ngIf="finished">
          <h3>Hai visto tutti i candidati!</h3>
          <p>Non ci sono piu profili disponibili al momento. Riprova piu tardi.</p>
        </div>

        <div class="empty-state" *ngIf="errored">
          <h3 style="color: #ff4b4b;">Errore di connessione al server</h3>
        </div>
      </div>

      <div class="action-buttons" *ngIf="current">
        <ion-button class="btn-action btn-skip" type="button" title="Scarta" (click)="handle('skip')">&times;</ion-button>
        <ion-button class="btn-action btn-save" type="button" title="Salva nei Preferiti" (click)="handle('save')">&#10084;</ion-button>
      </div>
    </div>
  </main>

  <!-- Modale profilo completo candidato -->
  <div class="candidate-modal-overlay" [class.active]="profileOpen">
    <div class="candidate-modal">
      <button class="candidate-modal-close" type="button" (click)="closeProfile()">&times;</button>
      <app-full-profile *ngIf="profileCard" [card]="profileCard"></app-full-profile>
    </div>
  </div>

  <app-change-password-modal #pwdModal [userId]="user.id"></app-change-password-modal>
</ion-content>
