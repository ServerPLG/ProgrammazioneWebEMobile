<ion-header class="ion-no-border">
  <app-page-header subtitle="Azienda">
  <a class="nav-btn" routerLink="/employer">⬅️ Torna a Discovery</a>
  <button class="nav-btn-logout" (click)="logout()">Logout</button>
</app-page-header>
</ion-header>

<ion-content>
  <main class="page-main narrow">
    <div class="glass-panel" style="max-width: 100%;">
      <h2 class="title" style="font-size: 2rem; text-align: left; margin-bottom: 0.5rem;">🏢 Azienda</h2>
      <p style="color: var(--text-muted-dark); margin-bottom: 2rem; font-size: 0.95rem;">
        Compila le informazioni sulla tua azienda. Queste verranno mostrate ai candidati nelle offerte di colloquio.
      </p>

      <form (ngSubmit)="save()" *ngIf="loaded">
        <div class="form-group">
          <label>Nome Azienda</label>
          <ion-input type="text" name="nomeAzienda" class="form-control" [(ngModel)]="nome_azienda" required placeholder="Es. TechCorp S.r.l."></ion-input>
        </div>

        <div class="form-group">
          <label>Descrizione Azienda</label>
          <ion-textarea name="descAzienda" class="form-control" [rows]="4" [(ngModel)]="descrizione_azienda" required placeholder="Descrivete brevemente la vostra azienda, cosa fate, cosa cercate..."></ion-textarea>
        </div>

        <div class="form-group">
          <label>📍 Sede Aziendale</label>
          <app-map-picker
            inputName="profileCitta"
            [lat]="lat"
            [lon]="lon"
            [zoom]="13"
            [initialCity]="citta"
            placeholder="Cerca una citta..."
            (locationChange)="onLocation($event)"
          ></app-map-picker>
          <small class="field-hint">Clicca sulla mappa o cerca una citta per posizionare la sede</small>
        </div>

        <ion-button type="submit" expand="block" class="btn" style="margin-top: 1.5rem;">Salva Profilo Azienda</ion-button>
        <div class="success-msg" *ngIf="resultMsg" [ngClass]="resultOk ? 'ok' : 'err'">{{ resultMsg }}</div>
      </form>
    </div>
  </main>
</ion-content>
